name: Victronator
options:
  bundleIdPrefix: com.victronator
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"

targets:
  Victronator:
    type: application
    platform: iOS
    sources:
      - Victronator
    info:
      path: Victronator/Info.plist
      properties:
        CFBundleDisplayName: Victronator
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSBluetoothAlwaysUsageDescription: "Victronator scans for Victron Energy device BLE advertisements to display solar and battery metrics."
        UIBackgroundModes:
          - bluetooth-central
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.victronator.app
        INFOPLIST_FILE: Victronator/Info.plist

  VictronatorTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - VictronatorTests
    dependencies:
      - target: Victronator
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.victronator.tests
        GENERATE_INFOPLIST_FILE: YES
